Section "ServerFlags"
  Option "AutoAddDevices" "true"
  Option "AutoEnableDevices" "true"
EndSection

Section "ServerLayout"
  Identifier "Layout0"
  Screen 0 "Screen0"
  Option "AllowMouseOpenFail" "true"
EndSection

Section "Device"
  Identifier "Device0"
  Driver "nvidia"
  VendorName "NVIDIA Corporation"
  BoardName "GeForce RTX 3070 Ti"
  BusID "PCI:1:0:0"
  # ヘッドレス運用のためのオプション（物理モニターなしでも動作）
  Option "AllowEmptyInitialConfiguration" "true"
  Option "ConnectedMonitor" "DFP-0"
  # パフォーマンスとティアリング防止
  Option "TripleBuffer" "true"
  Option "AllowIndirectGLXProtocol" "off"
  Option "metamodes" "DFP-0: 1920x1080_60 +0+0 {ForceFullCompositionPipeline=On}"
  Option "ModeValidation" "NoTotalSizeCheck"
EndSection

Section "Monitor"
  Identifier "Monitor0"
  VendorName "Virtual"
  ModelName "Virtual Monitor"
  HorizSync 28.0-80.0
  VertRefresh 48.0-75.0
  # 1920x1080 @ 60Hz
  Modeline "1920x1080_60" 148.50 1920 2008 2052 2200 1080 1084 1089 1125 +HSync +VSync
  Option "DPMS" "false"
EndSection

Section "Screen"
  Identifier "Screen0"
  Device "Device0"
  Monitor "Monitor0"
  DefaultDepth 24
  SubSection "Display"
    Depth 24
    Modes "1920x1080_60"
  EndSubSection
EndSection

# OpenGL と Composite 拡張を有効化
Section "Extensions"
  Option "Composite" "Enable"
  Option "RENDER" "Enable"
  Option "DAMAGE" "Enable"
EndSection
