Section "ServerLayout"
  Identifier "Layout0"
  Screen 0 "Screen0"
  InputDevice "Mouse0" "CorePointer"
  InputDevice "Keyboard0" "CoreKeyboard"
EndSection

Section "Device"
  Identifier "Device0"
  Driver "dummy"
  VideoRam 256000
EndSection

Section "Monitor"
  Identifier "Monitor0"
  HorizSync 28.0-80.0
  VertRefresh 48.0-75.0
  Modeline "1920x1080" 148.50 1920 2008 2052 2200 1080 1084 1089 1125 +Hsync +Vsync
EndSection

Section "Screen"
  Identifier "Screen0"
  Device "Device0"
  Monitor "Monitor0"
  DefaultDepth 24
  SubSection "Display"
    Depth 24
    Modes "1920x1080"
  EndSubSection
EndSection

Section "InputDevice"
  Identifier "Mouse0"
  Driver "libinput"
  Option "Device" "/dev/input/mice"
EndSection

Section "InputDevice"
  Identifier "Keyboard0"
  Driver "libinput"
  Option "Device" "/dev/input/event0"
EndSection
