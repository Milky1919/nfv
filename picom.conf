# Backend設定: GLXバックエンドを使用（NVIDIA GPU + VSync 対応）
backend = "glx";

# VSync設定（最重要）
vsync = true;

# GLX Backend設定
glx-no-stencil = true;
glx-no-rebind-pixmap = true;
use-damage = false;  # NVIDIA + GLXではfalseが必要（ティアリング防止）

# Performance最適化
unredir-if-possible = false;  # フルスクリーンでもコンポジターを維持
detect-transient = true;
detect-client-leader = true;

# リフレッシュレート自動検出
refresh-rate = 0;

# Shadow/Fade/Opacity無効化（パフォーマンス向上）
shadow = false;
fading = false;
inactive-opacity = 1.0;
active-opacity = 1.0;
frame-opacity = 1.0;

# Focus設定
mark-wmwin-focused = true;
mark-ovredir-focused = true;
use-ewmh-active-win = true;

# ログレベル
log-level = "info";
