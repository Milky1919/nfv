# Backend設定: xrenderバックエンドを使用（ダミードライバーでも動作）
backend = "xrender";

# VSync設定: xrenderでは VSync がサポートされないため無効化
vsync = false;

# use-damage 設定（変更領域のみ再描画でパフォーマンス向上）
use-damage = true;

# Performance最適化
unredir-if-possible = false;  # フルスクリーンでもコンポジターを維持
detect-transient = true;
detect-client-leader = true;

# リフレッシュレート自動検出
refresh-rate = 0;

# Shadow/Fade/Opacity無効化（パフォーマンス向上）
shadow = false;
fading = false;
inactive-opacity = 1.0;
active-opacity = 1.0;
frame-opacity = 1.0;

# Focus設定
mark-wmwin-focused = true;
mark-ovredir-focused = true;
use-ewmh-active-win = true;

# ログレベル
log-level = "info";
